<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图寻活跃前100监控</title>
    <link rel="icon" href="/icon.ico" type="image/x-icon">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin-right: 360px;
        }

        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 360px;
            height: 100vh;
            background: rgba(20, 20, 35, 0.98);
            border-left: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            background: rgba(255, 148, 39, 0.15);
            border-bottom: 1px solid rgba(255, 148, 39, 0.3);
        }

        .sidebar-header h3 {
            font-size: 18px;
            color: #ff9427;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 6px;
        }

        .sidebar-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: rgba(255, 148, 39, 0.5);
            border-radius: 3px;
        }

        .change-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 4px solid #ff9427;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .change-item.negative {
            border-left-color: #e74c3c;
        }

        .change-item.positive {
            border-left-color: #27ae60;
        }

        .change-time {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .change-player {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
        }

        .change-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .change-diff {
            font-size: 20px;
            font-weight: 700;
        }

        .change-diff.positive { color: #2ecc71; }
        .change-diff.negative { color: #e74c3c; }

        .change-rank {
            color: #aaa;
            font-size: 14px;
        }

        .no-changes {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 16px;
        }

        .current-time {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.6);
            padding: 12px 18px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            text-align: left;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .current-time .date {
            font-size: 13px;
            color: #aaa;
            font-weight: 400;
        }

        .toast-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .toast {
            background: rgba(255, 148, 39, 0.95);
            color: white;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 400px;
            min-width: 300px;
            animation: toastIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .toast-close {
            position: absolute;
            top: 8px;
            right: 10px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: 20px;
            cursor: pointer;
            padding: 0;
            line-height: 1;
            transition: color 0.2s;
        }

        .toast-close:hover {
            color: #fff;
        }

        .toast.removing {
            animation: toastOut 0.3s ease-in forwards;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateY(-30px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        @keyframes toastOut {
            from {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            to {
                opacity: 0;
                transform: translateY(-20px) scale(0.9);
            }
        }

        .toast h4 {
            font-size: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toast-content {
            font-size: 14px;
            line-height: 1.8;
        }

        .toast-item {
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .toast-item:last-child {
            border-bottom: none;
        }

        .toast-item .player-change {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toast-item .rank-info {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 2px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #ff9427, #ffb347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header .subtitle {
            color: #888;
            font-size: 16px;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 24px;
        }

        .mode-switch {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 25px;
        }

        .mode-switch span {
            font-size: 16px;
            color: #aaa;
            transition: color 0.3s;
        }

        .mode-switch span.active {
            color: #ff9427;
            font-weight: 600;
        }

        .toggle-btn {
            width: 56px;
            height: 30px;
            background: #333;
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            transition: background 0.3s;
        }

        .toggle-btn::after {
            content: '';
            position: absolute;
            width: 26px;
            height: 26px;
            background: #fff;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: transform 0.3s;
        }

        .toggle-btn.world::after {
            transform: translateX(26px);
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff9427, #ff7b00);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 148, 39, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }

        .interval-setting {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 25px;
        }

        .interval-setting label {
            font-size: 14px;
            color: #aaa;
        }

        .interval-setting input {
            width: 60px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            text-align: center;
        }

        .interval-setting input:focus {
            outline: none;
            border-color: #ff9427;
        }

        .interval-setting span {
            font-size: 14px;
            color: #aaa;
        }

        .range-setting {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 25px;
        }

        .range-setting label {
            font-size: 14px;
            color: #aaa;
        }

        .range-setting input {
            width: 50px;
            padding: 6px 8px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            text-align: center;
        }

        .range-setting input:focus {
            outline: none;
            border-color: #ff9427;
        }

        .range-setting span {
            font-size: 14px;
            color: #aaa;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 15px;
        }

        .status-bar .left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #27ae60;
            animation: pulse 2s infinite;
        }

        .status-dot.paused {
            background: #e74c3c;
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .active-count {
            background: rgba(39, 174, 96, 0.2);
            color: #2ecc71;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 500;
            font-size: 15px;
        }

        .rank-table-container {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        .rank-table {
            width: 100%;
            border-collapse: collapse;
        }

        .rank-table th {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px 14px;
            text-align: left;
            font-weight: 600;
            color: #aaa;
            font-size: 15px;
            position: sticky;
            top: 0;
        }

        .rank-table th:nth-child(1),
        .rank-table th:nth-child(3),
        .rank-table th:nth-child(4) {
            text-align: center;
        }

        .rank-table td {
            padding: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 16px;
        }

        .rank-table td:nth-child(1),
        .rank-table td:nth-child(3),
        .rank-table td:nth-child(4) {
            text-align: center;
        }

        .rank-table tr.active-row {
            background: rgba(39, 174, 96, 0.15);
        }

        .rank-table tr:nth-child(even):not(.active-row) {
            background: rgba(255, 255, 255, 0.02);
        }

        .rank-table tr:hover {
            background: rgba(255, 148, 39, 0.1);
        }

        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: 700;
            font-size: 14px;
        }

        .rank-1 { background: linear-gradient(135deg, #FFD700, #FFA500); color: #000; }
        .rank-2 { background: linear-gradient(135deg, #C0C0C0, #A8A8A8); color: #000; }
        .rank-3 { background: linear-gradient(135deg, #CD7F32, #B8860B); color: #fff; }
        .rank-top10 { background: rgba(255, 107, 107, 0.3); color: #FF6B6B; }
        .rank-other { background: rgba(255, 255, 255, 0.1); color: #aaa; }

        .player-name {
            font-weight: 500;
            color: #e0e0e0;
            cursor: pointer;
            transition: color 0.2s;
        }

        .player-name:hover {
            color: #ff9427;
            text-decoration: underline;
        }

        .rating {
            font-weight: 700;
            font-size: 17px;
        }

        .change {
            font-weight: 600;
            font-size: 15px;
        }

        .change.positive { color: #2ecc71; }
        .change.negative { color: #e74c3c; }
        .change.neutral { color: #666; }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 148, 39, 0.3);
            border-top-color: #ff9427;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            padding: 24px;
            color: #666;
            font-size: 14px;
            margin-top: 20px;
        }

        .mobile-sidebar-btn {
            display: none;
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1001;
            background: linear-gradient(135deg, #ff9427, #ff7b00);
            color: white;
            border: none;
            padding: 14px 22px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(255, 148, 39, 0.4);
            transition: all 0.3s ease;
        }

        .mobile-sidebar-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(255, 148, 39, 0.5);
        }

        .mobile-sidebar-btn:active {
            transform: scale(0.96);
        }

        .mobile-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99;
        }

        .mobile-overlay.show {
            display: block;
        }

        @media (max-width: 1200px) {
            .main-content {
                margin-right: 0;
            }

            .sidebar {
                display: none;
                position: fixed;
                right: 0;
                top: 0;
                width: 320px;
                max-width: 85vw;
                height: 100vh;
                z-index: 100;
                transform: translateX(100%);
                transition: transform 0.3s ease;
            }

            .sidebar.show {
                display: flex;
                transform: translateX(0);
            }

            .mobile-sidebar-btn {
                display: block;
            }
        }

        @media (max-width: 600px) {
            .container {
                padding: 10px;
            }

            .current-time {
                font-size: 14px;
                padding: 8px 12px;
                top: 10px;
                left: 10px;
            }

            .current-time .date {
                font-size: 11px;
            }

            .header h1 {
                font-size: 24px;
            }

            .controls {
                gap: 10px;
            }

            .btn {
                padding: 10px 16px;
                font-size: 14px;
            }

            .rank-table th,
            .rank-table td {
                padding: 10px 8px;
                font-size: 14px;
            }

            .status-bar {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .toast {
                min-width: 280px;
                max-width: 90vw;
            }

            .mobile-sidebar-btn {
                bottom: 16px;
                right: 16px;
                padding: 12px 18px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-sidebar-btn" id="mobileSidebarBtn">
        展开变化记录
    </button>

    <div class="mobile-overlay" id="mobileOverlay"></div>

    <div class="toast-container" id="toastContainer"></div>

    <div class="current-time" id="currentTime">
        <div class="date" id="currentDate"></div>
        <div id="timeDisplay">--:--:--</div>
    </div>

    <div class="main-content">
        <div class="container">
            <div class="header">
                <h1>图寻活跃前100监控</h1>
                <p class="subtitle">实时监控排行榜积分变动</p>
                <div class="controls">
                    <div class="mode-switch">
                        <span id="chinaLabel" class="active">中国</span>
                        <div class="toggle-btn" id="modeToggle"></div>
                        <span id="worldLabel">世界</span>
                    </div>
                    <button class="btn btn-primary" id="refreshBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                        </svg>
                        手动刷新
                    </button>
                    <button class="btn btn-success" id="autoRefreshBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        自动刷新已打开
                    </button>
                    <div class="interval-setting">
                        <label>间隔:</label>
                        <input type="number" id="intervalInput" value="5" min="1" max="60">
                        <span>秒</span>
                    </div>
                    <div class="range-setting">
                        <label>排名:</label>
                        <input type="number" id="rankStart" value="1" min="1" max="9999">
                        <span>-</span>
                        <input type="number" id="rankEnd" value="100" min="1" max="9999">
                    </div>
                </div>
            </div>

            <div class="status-bar">
                <div class="left">
                    <div class="status-indicator">
                        <div class="status-dot" id="statusDot"></div>
                        <span id="statusText">自动刷新已打开</span>
                    </div>
                    <span id="lastUpdate">等待数据...</span>
                </div>
                <div class="active-count" id="activeCount">活跃: 0 / 100</div>
            </div>

            <div class="rank-table-container">
                <table class="rank-table">
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>玩家</th>
                            <th>积分</th>
                            <th>变动</th>
                        </tr>
                    </thead>
                    <tbody id="rankList">
                        <tr>
                            <td colspan="4">
                                <div class="loading">
                                    <div class="loading-spinner"></div>
                                    <div>正在加载数据...</div>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="footer">
                数据来源: tuxun.fun
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h3>
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
                </svg>
                积分变动记录
            </h3>
        </div>
        <div class="sidebar-content" id="changeHistory">
            <div class="no-changes">暂无变动记录</div>
        </div>
    </div>

    <script>
        const TUXUN_API = 'https://tuxun.fun/api/v0/tuxun';
        const isLocalFile = window.location.protocol === 'file:';
        
        let currentMode = 'china';
        let isAutoRefresh = false;
        let autoRefreshInterval = null;
        let refreshIntervalSeconds = 5;
        let rankStart = 1;
        let rankEnd = 100;
        let playerHistory = { china: {}, world: {} };
        let currentRankData = [];
        let changeHistory = { china: [], world: [] };

        const modeToggle = document.getElementById('modeToggle');
        const chinaLabel = document.getElementById('chinaLabel');
        const worldLabel = document.getElementById('worldLabel');
        const refreshBtn = document.getElementById('refreshBtn');
        const autoRefreshBtn = document.getElementById('autoRefreshBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const lastUpdate = document.getElementById('lastUpdate');
        const activeCount = document.getElementById('activeCount');
        const rankList = document.getElementById('rankList');
        const changeHistoryEl = document.getElementById('changeHistory');
        const timeDisplay = document.getElementById('timeDisplay');
        const currentDate = document.getElementById('currentDate');
        const toastContainer = document.getElementById('toastContainer');
        const intervalInput = document.getElementById('intervalInput');
        const footerInterval = document.getElementById('footerInterval');
        const rankStartInput = document.getElementById('rankStart');
        const rankEndInput = document.getElementById('rankEnd');
        const mobileSidebarBtn = document.getElementById('mobileSidebarBtn');
        const mobileOverlay = document.getElementById('mobileOverlay');
        const sidebar = document.querySelector('.sidebar');

        function init() {
            loadHistory();
            loadChangeHistory();
            loadIntervalSetting();
            loadRangeSetting();
            updateAutoRefreshUI();
            updateTitle();
            fetchRankData();
            updateCurrentTime();
            setInterval(updateCurrentTime, 1000);
            setupMobileSidebar();
            setupVisibilityListener();
        }

        function setupVisibilityListener() {
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    if (isAutoRefresh) {
                        stopAutoRefresh();
                    }
                } else {
                    if (isAutoRefresh) {
                        startAutoRefresh();
                        fetchRankData();
                    }
                }
            });
        }

        function setupMobileSidebar() {
            mobileSidebarBtn.addEventListener('click', () => {
                if (sidebar.classList.contains('show')) {
                    sidebar.classList.remove('show');
                    mobileOverlay.classList.remove('show');
                    mobileSidebarBtn.textContent = '展开变化记录';
                } else {
                    sidebar.classList.add('show');
                    mobileOverlay.classList.add('show');
                    mobileSidebarBtn.textContent = '收起';
                }
            });

            mobileOverlay.addEventListener('click', () => {
                sidebar.classList.remove('show');
                mobileOverlay.classList.remove('show');
                mobileSidebarBtn.textContent = '展开变化记录';
            });
        }

        function updateCurrentTime() {
            const now = new Date();
            timeDisplay.textContent = now.toLocaleTimeString('zh-CN', { hour12: false });
            currentDate.textContent = now.toLocaleDateString('zh-CN', { 
                year: 'numeric', 
                month: '2-digit', 
                day: '2-digit',
                weekday: 'short'
            });
        }

        function loadHistory() {
            const saved = localStorage.getItem('playerHistory');
            if (saved) {
                playerHistory = JSON.parse(saved);
            }
        }

        function saveHistory() {
            localStorage.setItem('playerHistory', JSON.stringify(playerHistory));
        }

        function loadChangeHistory() {
            const saved = localStorage.getItem('changeHistory');
            if (saved) {
                changeHistory = JSON.parse(saved);
                renderChangeHistory();
            }
        }

        function saveChangeHistory() {
            localStorage.setItem('changeHistory', JSON.stringify(changeHistory));
        }

        function loadIntervalSetting() {
            const saved = localStorage.getItem('refreshInterval');
            if (saved) {
                refreshIntervalSeconds = parseInt(saved, 10);
                intervalInput.value = refreshIntervalSeconds;
                footerInterval.textContent = refreshIntervalSeconds;
            }
        }

        function saveIntervalSetting() {
            localStorage.setItem('refreshInterval', refreshIntervalSeconds.toString());
            footerInterval.textContent = refreshIntervalSeconds;
        }

        function loadRangeSetting() {
            const savedStart = localStorage.getItem('rankStart');
            const savedEnd = localStorage.getItem('rankEnd');
            if (savedStart) {
                rankStart = parseInt(savedStart, 10);
                rankStartInput.value = rankStart;
            }
            if (savedEnd) {
                rankEnd = parseInt(savedEnd, 10);
                rankEndInput.value = rankEnd;
            }
        }

        function saveRangeSetting() {
            localStorage.setItem('rankStart', rankStart.toString());
            localStorage.setItem('rankEnd', rankEnd.toString());
        }

        function updateTitle() {
            const titleEl = document.querySelector('.header h1');
            titleEl.textContent = `图寻排名 ${rankStart}-${rankEnd} 监控`;
        }

        intervalInput.addEventListener('change', () => {
            let value = parseInt(intervalInput.value, 10);
            if (isNaN(value) || value < 1) value = 1;
            if (value > 60) value = 60;
            refreshIntervalSeconds = value;
            intervalInput.value = value;
            saveIntervalSetting();
            if (isAutoRefresh) {
                startAutoRefresh();
            }
        });

        rankStartInput.addEventListener('change', () => {
            let value = parseInt(rankStartInput.value, 10);
            if (isNaN(value) || value < 1) value = 1;
            if (value >= rankEnd) value = rankEnd - 1;
            rankStart = value;
            rankStartInput.value = value;
            saveRangeSetting();
            updateTitle();
            fetchRankData();
        });

        rankEndInput.addEventListener('change', () => {
            let value = parseInt(rankEndInput.value, 10);
            if (isNaN(value) || value < 1) value = 1;
            if (value <= rankStart) value = rankStart + 1;
            rankEnd = value;
            rankEndInput.value = value;
            saveRangeSetting();
            updateTitle();
            fetchRankData();
        });

        modeToggle.addEventListener('click', () => {
            currentMode = currentMode === 'china' ? 'world' : 'china';
            updateModeUI();
            renderChangeHistory();
            fetchRankData();
        });

        function updateModeUI() {
            if (currentMode === 'world') {
                modeToggle.classList.add('world');
                chinaLabel.classList.remove('active');
                worldLabel.classList.add('active');
            } else {
                modeToggle.classList.remove('world');
                chinaLabel.classList.add('active');
                worldLabel.classList.remove('active');
            }
        }

        refreshBtn.addEventListener('click', () => {
            fetchRankData();
        });

        autoRefreshBtn.addEventListener('click', () => {
            isAutoRefresh = !isAutoRefresh;
            if (isAutoRefresh) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
            updateAutoRefreshUI();
        });

        function startAutoRefresh() {
            if (autoRefreshInterval) clearInterval(autoRefreshInterval);
            autoRefreshInterval = setInterval(() => {
                if (isAutoRefresh) fetchRankData();
            }, refreshIntervalSeconds * 1000);
        }

        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        function updateAutoRefreshUI() {
            if (isAutoRefresh) {
                autoRefreshBtn.className = 'btn btn-success';
                autoRefreshBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polygon points="5 3 19 12 5 21 5 3"/>
                    </svg>
                    自动刷新已打开
                `;
                statusDot.classList.remove('paused');
                statusText.textContent = '自动刷新已打开';
            } else {
                autoRefreshBtn.className = 'btn btn-danger';
                autoRefreshBtn.innerHTML = `
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="6" y="4" width="4" height="16"/>
                        <rect x="14" y="4" width="4" height="16"/>
                    </svg>
                    自动刷新已关闭
                `;
                statusDot.classList.add('paused');
                statusText.textContent = '自动刷新已关闭';
            }
        }

        async function fetchRankData() {
            if (isLocalFile) {
                showError('请使用本地服务器运行。在终端执行: node server.js 然后访问 http://localhost:8080');
                return;
            }
            try {
                const response = await fetch(`/api/rank?type=${currentMode}`);
                const data = await response.json();
                
                if (data.success) {
                    processRankData(data.data);
                } else {
                    showError('获取数据失败，正在自动重置...');
                    setTimeout(() => {
                        localStorage.removeItem('changeHistory');
                        localStorage.removeItem('playerHistory');
                        location.reload();
                    }, 2000);
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showError('网络请求失败，正在自动重置...');
                setTimeout(() => {
                    localStorage.removeItem('changeHistory');
                    localStorage.removeItem('playerHistory');
                    location.reload();
                }, 2000);
            }
        }

        function processRankData(data) {
            const sortedData = data
                .filter(item => item && item.rank)
                .sort((a, b) => a.rank - b.rank)
                .filter(item => item.rank >= rankStart && item.rank <= rankEnd);

            let changedPlayers = [];
            const changeTime = new Date();
            
            sortedData.forEach(player => {
                const userId = player.userAO.userId;
                const currentRating = currentMode === 'china' ? player.userAO.chinaRating : player.userAO.rating;
                const oldRecord = playerHistory[currentMode][userId];

                if (oldRecord && oldRecord.rating !== currentRating) {
                    const diff = currentRating - oldRecord.rating;
                    changedPlayers.push({
                        name: player.userAO.userName,
                        diff: diff,
                        rank: player.rank,
                        newRating: currentRating,
                        time: changeTime.toLocaleTimeString('zh-CN', { hour12: false }),
                        timestamp: changeTime.getTime()
                    });
                }
            });

            if (changedPlayers.length > 0) {
                addChangeRecords(changedPlayers);
                showToast(changedPlayers);
            }

            currentRankData = sortedData;
            checkActivePlayers(sortedData);
        }

        function addChangeRecords(players) {
            players.forEach(player => {
                changeHistory[currentMode].unshift(player);
            });
            
            if (changeHistory[currentMode].length > 10) {
                changeHistory[currentMode] = changeHistory[currentMode].slice(0, 10);
            }
            
            saveChangeHistory();
            renderChangeHistory();
        }

        function renderChangeHistory() {
            const history = changeHistory[currentMode];
            if (!history || history.length === 0) {
                changeHistoryEl.innerHTML = '<div class="no-changes">暂无变动记录</div>';
                return;
            }

            let html = '';
            history.forEach(record => {
                const diffClass = record.diff > 0 ? 'positive' : 'negative';
                const diffSign = record.diff > 0 ? '+' : '';
                const itemClass = record.diff > 0 ? 'positive' : 'negative';
                
                html += `
                    <div class="change-item ${itemClass}">
                        <div class="change-time">${record.time}</div>
                        <div class="change-player">${escapeHtml(record.name)}</div>
                        <div class="change-detail">
                            <span class="change-diff ${diffClass}">${diffSign}${record.diff}</span>
                            <span class="change-rank">第 ${record.rank} 名 | ${record.newRating} 分</span>
                        </div>
                    </div>
                `;
            });
            
            changeHistoryEl.innerHTML = html;
        }

        function showToast(players) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            
            let content = '';
            players.forEach(p => {
                const diffClass = p.diff > 0 ? 'positive' : 'negative';
                const diffSign = p.diff > 0 ? '+' : '';
                content += `
                    <div class="toast-item">
                        <div class="player-change">
                            <span>${escapeHtml(p.name)}</span>
                            <span class="change ${diffClass}">${diffSign}${p.diff}</span>
                        </div>
                        <div class="rank-info">当前排名: 第 ${p.rank} 名 | 积分: ${p.newRating}</div>
                    </div>
                `;
            });
            
            toast.innerHTML = `
                <button class="toast-close" onclick="this.parentElement.remove()">&times;</button>
                <h4>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/>
                    </svg>
                    积分变动提醒 (${players[0].time})
                </h4>
                <div class="toast-content">${content}</div>
            `;
            
            toastContainer.insertBefore(toast, toastContainer.firstChild);
            
            const autoRemove = setTimeout(() => {
                toast.classList.add('removing');
                setTimeout(() => {
                    if (toast.parentNode) {
                        toast.parentNode.removeChild(toast);
                    }
                }, 300);
            }, 10000);
            
            toast.querySelector('.toast-close').addEventListener('click', () => {
                clearTimeout(autoRemove);
            });
        }

        async function checkActivePlayers(data) {
            const checkPromises = data.map(async player => {
                const userId = player.userAO.userId;
                try {
                    const response = await fetch(`/api/activity?userId=${userId}`);
                    const result = await response.json();
                    player.isActive = result.isActive;
                } catch {
                    player.isActive = false;
                }
                return player;
            });

            const dataWithActive = await Promise.all(checkPromises);
            displayRankList(dataWithActive);
            updatePlayerHistory(dataWithActive);
            
            const activeNum = dataWithActive.filter(p => p.isActive).length;
            activeCount.textContent = `活跃: ${activeNum} / ${dataWithActive.length}`;
            lastUpdate.textContent = `最后更新: ${new Date().toLocaleTimeString('zh-CN', { hour12: false })}`;
        }

        function updatePlayerHistory(data) {
            data.forEach(player => {
                const userId = player.userAO.userId;
                const currentRating = currentMode === 'china' ? player.userAO.chinaRating : player.userAO.rating;
                playerHistory[currentMode][userId] = {
                    rating: currentRating,
                    userName: player.userAO.userName,
                    timestamp: Date.now()
                };
            });
            saveHistory();
        }

        function displayRankList(data) {
            let html = '';
            
            data.forEach((player) => {
                const currentRating = currentMode === 'china' ? player.userAO.chinaRating : player.userAO.rating;
                const record = playerHistory[currentMode][player.userAO.userId];
                let changeText = '0';
                let changeClass = 'neutral';

                if (record) {
                    const diff = currentRating - record.rating;
                    if (diff > 0) {
                        changeText = `+${diff}`;
                        changeClass = 'positive';
                    } else if (diff < 0) {
                        changeText = diff;
                        changeClass = 'negative';
                    }
                }

                const rowClass = player.isActive ? 'active-row' : '';
                let rankClass = 'rank-other';
                if (player.rank === 1) rankClass = 'rank-1';
                else if (player.rank === 2) rankClass = 'rank-2';
                else if (player.rank === 3) rankClass = 'rank-3';
                else if (player.rank <= 10) rankClass = 'rank-top10';

                html += `
                    <tr class="${rowClass}">
                        <td><span class="rank-badge ${rankClass}">${player.rank}</span></td>
                        <td class="player-name" onclick="openUserProfile('${player.userAO.userId}')">${escapeHtml(player.userAO.userName)}</td>
                        <td class="rating">${currentRating}</td>
                        <td class="change ${changeClass}">${changeText}</td>
                    </tr>
                `;
            });

            rankList.innerHTML = html;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openUserProfile(userId) {
            window.open(`https://tuxun.fun/user/${userId}`, '_blank');
        }

        function showError(message) {
            rankList.innerHTML = `
                <tr>
                    <td colspan="4">
                        <div class="loading">
                            <div style="color: #e74c3c; margin-bottom: 10px; font-size: 16px;">${message}</div>
                            <button class="btn btn-primary" onclick="fetchRankData()">重试</button>
                        </div>
                    </td>
                </tr>
            `;
        }

        init();
    </script>
</body>
</html>
